services:
  sleep-stats:
    build: .
    container_name: garmin_sleep_stats
    ports:
      - "8501:8501"
    volumes:
      - ./data_persistence:/app/data_mount # To be used if logic is updated to use a subfolder
      # OR better: Map the specific files/folders needed for persistence
      - .:/app 
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
